<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shalom Ogilvy — Passover</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,400;0,500;0,600;1,400&family=Orbitron:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=4" />
  </head>
  <body style="background: #000000; color: #e8eef5">
    <canvas id="stars-canvas" class="stars-canvas" aria-hidden="true"></canvas>
    <div class="stars stars--glow" aria-hidden="true"></div>
    <div class="nebula" aria-hidden="true"></div>

    <main class="shell" id="shell">
      <header class="intro" id="intro">
        <p class="line line--glow">hello there happy passover Ogilvy</p>
        <p class="line">click the matzah for a clue</p>
      </header>

      <div class="afikoman-stack" id="afikoman-stack">
        <div class="matzah-slot" id="matzah-slot">
        <section
          class="panel panel--glass panel--locked panel--stacked"
          id="panel-form"
          aria-labelledby="form-heading"
          hidden
        >
        <h1 id="form-heading" class="sr-only">Join the email list</h1>
        <p class="blurb">
          To get the clue, submit your Ogilvy email to join the email list and
          learn first of any Shalom Ogilvy Events.
        </p>
        <form class="signup" id="signup-form" novalidate>
          <label class="sr-only" for="email">Ogilvy email</label>
          <input
            id="email"
            name="email"
            type="email"
            inputmode="email"
            autocomplete="email"
            placeholder="you@ogilvy.com"
            required
          />
          <button type="submit" id="submit-btn">Get the clue</button>
        </form>
        <p class="status status--saving" id="form-saving" role="status" aria-live="polite" hidden>
          <span class="saving-spinner" aria-hidden="true"></span>
          <span>Saving your email…</span>
        </p>
        <p class="status status--error" id="form-error" role="alert" hidden></p>
        </section>

        <div class="matzah-stage" id="matzah-stage">
          <img
            id="matzah"
            class="matzah matzah--interactive"
            src="assets/matzah.png"
            alt="Matzah"
            width="320"
            height="320"
            role="button"
            tabindex="0"
            aria-label="Open the email form"
          />
        </div>
        </div>
      </div>

      <section class="panel panel--glass panel--reveal" id="panel-reveal" hidden>
        <div class="clue clue--riddle" id="clue-text" aria-live="polite"></div>
        <p class="hunt" id="hunt-text" aria-live="polite"></p>
      </section>
    </main>

    <!-- Google Apps Script accepts POST without CORS issues when using form+iframe (not fetch). -->
    <form
      id="sheet-proxy-form"
      method="post"
      action=""
      target="sheet-proxy-frame"
      enctype="application/x-www-form-urlencoded"
      class="sheet-proxy"
      aria-hidden="true"
    >
      <input type="hidden" name="email" id="sheet-proxy-email" value="" />
    </form>
    <iframe
      name="sheet-proxy-frame"
      id="sheet-proxy-frame"
      class="sheet-proxy-frame"
      title="Submission"
    ></iframe>

    <script src="stars.js?v=4"></script>
    <script src="config.js?v=4"></script>
    <script src="app.js?v=4"></script>
  </body>
</html>
